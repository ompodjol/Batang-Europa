<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Batang Europa Basketball{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🏀 Batang Europa Basketball</h1>
            </div>
            <ul class="nav-links">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/about" class="nav-link">About</a></li>
                <li><a href="/roster" class="nav-link">Roster</a></li>
                <li><a href="/schedule" class="nav-link">Schedule</a></li>
                <li><a href="/gallery" class="nav-link">Gallery</a></li>
                <li><a href="/register" class="nav-link">Register</a></li>
                <li><a href="/contact" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <p>&copy; 2026 Batang Europa Basketball Program. All rights reserved.</p>
                </div>
                <div class="footer-section social-media">
                    <h4>Follow Us</h4>
                    <div class="social-links">
                        <a href="https://www.facebook.com/profile.php?id=61573813887545" target="_blank" rel="noopener noreferrer" class="social-icon" title="Facebook">
                            📘 Facebook
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
