# Docker Compose Configuration for local development and production

version: '3.8'

services:
  web:
    build: .
    ports:
      - "1981:1981"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
    volumes:
      - .:/app
    restart: unless-stopped

